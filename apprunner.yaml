# AWS App Runner — source-based build/run for the Smriti Node server.
# App Runner reads this from the repo root, builds with npm, and runs `npm start`.
# No Dockerfile needed. HTTPS, autoscaling and the public URL are managed for you.
version: 1.0
runtime: nodejs18
build:
  commands:
    build:
      - npm install
run:
  command: npm start
  network:
    port: 8080
  env:
    # The server reads process.env.PORT — App Runner routes traffic to this port.
    - name: PORT
      value: "8080"
  # Secrets are NOT stored here. Set them in the App Runner service config
  # (Console → Configure service → Environment variables), or reference AWS
  # Secrets Manager by ARN:
  #
  # secrets:
  #   - name: ANTHROPIC_API_KEY
  #     value-from: "arn:aws:secretsmanager:<region>:<account>:secret:smriti/anthropic"
  #   - name: ASSEMBLYAI_API_KEY
  #     value-from: "arn:aws:secretsmanager:<region>:<account>:secret:smriti/assemblyai"
